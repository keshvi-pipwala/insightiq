# Railway injects $PORT at runtime - this template is filled by entrypoint.sh
server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend service (URL injected at build time via VITE_API_URL)
    # In production the frontend calls the backend URL directly (VITE_API_URL),
    # so this block only matters for the Docker Compose local setup.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_read_timeout 120s;
        # Required for SSE streaming — disable buffering
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
